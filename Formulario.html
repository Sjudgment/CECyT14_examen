<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 2rem; }
        .form-contenedor { border: 1px solid #ddd; padding: 2rem; border-radius: 8px; background: #f8f9fa; }
        .campo { margin: 1rem 0; }
        label { display: block; margin-bottom: 0.3rem; }
        input[type="text"], input[type="email"] { width: 100%; padding: 0.5rem; border: 1px solid #aaa; border-radius: 4px; }
        button { background: #004488; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 0.5rem; }
        .volver { text-align: center; margin-top: 1.5rem; }
        a { color: #8B0000; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-contenedor">
        <h2>Formulario del Alumno</h2>
        <form action="resultado.html" method="get">
            <div class="campo">
                <label>Nombre del alumno:</label>
                <input type="text" name="nombre" required>
            </div>

            <div class="campo">
                <label>Grupo:</label><br>
                <input type="radio" name="grupo" value="2IV3" id="g1" required>
                <label for="g1"> 2IV3</label><br>
                <input type="radio" name="grupo" value="2IV6" id="g2">
                <label for="g2"> 2IV6</label>
            </div>

            <div class="campo">
                <label>Correo electrónico:</label>
                <input type="email" name="correo" required>
            </div>

            <button type="submit">Enviar registro</button>
        </form>

        <div class="volver">
            <a href="index.html">← Volver a Inicio</a>
        </div>
    </div>
</body>
</html>
